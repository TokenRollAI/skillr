services:
  postgres:
    image: postgres:16-alpine
    container_name: skillr-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: skillhub
      POSTGRES_PASSWORD: skillhub
      POSTGRES_DB: skillhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: skillr-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: skillr-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/skillhub-artifacts --ignore-existing;
      echo 'Bucket skillhub-artifacts created successfully';
      "

volumes:
  postgres_data:
  minio_data:
